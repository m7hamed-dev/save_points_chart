name: save_points_chart
description: >-
  Modern Flutter charting library with 17 chart types, Material 3 design,
  smooth animations, glassmorphism & neumorphism effects, and zero runtime
  dependencies.
version: 1.9.0
homepage: https://github.com/m7hamed-dev/save_points_chart
repository: https://github.com/m7hamed-dev/save_points_chart
issue_tracker: https://github.com/m7hamed-dev/save_points_chart/issues
documentation: https://pub.dev/documentation/save_points_chart/latest/

topics:
  - chart
  - charts
  - graph
  - visualization
  - material-design

environment:
  sdk: ^3.11.4
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

